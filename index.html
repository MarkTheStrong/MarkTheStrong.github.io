<!DOCTYPE html> 
<html lang="en">
<head> 
    
    
    
    <!-- this is for transitions between pages -->
   <script> 
   (function(){
    var dir = sessionStorage.getItem('navDirection');
    if (!dir) return;

    var startX = dir === 'forward' ? '100%' : '-100%';
    var style  = document.createElement('style');
    style.id   = '__page-enter-start';
    style.textContent = [
        '.parallax-container {',
        '    transform: translateX(' + startX + ') !important;',
        '    transition: none !important;',
        '}',
        '.main-container {',
        '    transform: translateX(' + startX + ') !important;',
        '    transition: none !important;',
        '}',
        '.options-list {',
        '    transform: translateX(' + startX + ') !important;',
        '    transition: none !important;',
        '}'
    ].join('\n');
    document.head.appendChild(style);
   })();

   </script>
